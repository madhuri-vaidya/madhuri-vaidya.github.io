        <main class="contact-page">
            <h1>Contact Me</h1>
            <p>Want to collaborate on performance engineering, benchmark automation, or research? Drop a message below and I’ll get back to you.</p>

            <form class="contact-form" action="mailto:madhuriphute@gmail.com" method="post" enctype="text/plain">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type your message here" required></textarea>

                <button type="submit">Send Message</button>
            </form>

            <a class="back-link" href="index.html">← Back to home</a>
        </main>
    </body>
